# =============================================================================
# Sync Feed — povlači interni feed (olx.json) i snima snapshot u Supabase.
# Pokreće se svakih 24h.
# =============================================================================
name: sync-feed

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch: {}

concurrency:
  group: sync-feed
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run feed sync
        env:
          FEED_URL: ${{ secrets.FEED_URL }}
          FEED_API_KEY: ${{ secrets.FEED_API_KEY }}
          FEED_AUTH_MODE: ${{ secrets.FEED_AUTH_MODE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run job:sync-feed
