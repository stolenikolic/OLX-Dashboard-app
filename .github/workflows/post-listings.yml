# =============================================================================
# Post Listings — postavlja nove oglase po profilu (bez duplikata).
# Ručno: opcionalno profile_id + category_id (jedna kategorija, skip import).
# =============================================================================
name: post-listings

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      profile_id:
        description: "Ručno: pokreni samo za jedan profil (uuid)"
        required: false
      category_id:
        description: "Ručno: samo jedna kategorija (uuid); skip import"
        required: false
      skip_import:
        description: 'Preskoči OLX import ("true" / "false")'
        required: false
        default: ""

concurrency:
  group: post-listings
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      has_profiles: ${{ steps.list.outputs.has_profiles }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - id: list
        name: Lista aktivnih profila
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ONLY_PROFILE_ID: ${{ github.event.inputs.profile_id }}
        run: npm run job:list-active-profiles

  post:
    needs: prepare
    if: ${{ needs.prepare.outputs.has_profiles == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

      - name: Stagger jitter (preskoči za category run)
        if: ${{ github.event.inputs.category_id == '' || github.event.inputs.category_id == null }}
        env:
          PROFILE_ID: ${{ matrix.profile.id }}
        run: |
          HASH=$(printf '%s' "$PROFILE_ID" | sha256sum | cut -c1-8)
          SEED=$((16#$HASH))
          DELAY=$((SEED % 2700))
          echo "Profil $PROFILE_ID — čekam ${DELAY}s"
          sleep "$DELAY"

      - name: Post listings for profile
        env:
          PROFILE_ID: ${{ matrix.profile.id }}
          CATEGORY_ID: ${{ github.event.inputs.category_id }}
          SKIP_IMPORT: ${{ github.event.inputs.skip_import }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run job:post-listings
